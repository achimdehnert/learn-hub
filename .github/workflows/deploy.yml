name: "Deploy"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-learn-hub-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag_override:
        description: "Rollback auf Image-Tag (z.B. v1.2.1) — leer = auto"
        required: false
        default: ""
      target_environment:
        description: "Ziel-Environment (leer=auto, staging, production)"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  ci:
    uses: iilgmbh/shared-ci/.github/workflows/_ci-python.yml@v1.0.0
    if: startsWith(github.ref, 'refs/heads/')
    with:
      skip_tests: true
      django_settings_module: "config.settings.test"
    secrets: inherit

  deploy:
    needs: [ci]
    if: always() && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    uses: iilgmbh/shared-ci/.github/workflows/_deploy-unified.yml@v1.0.0
    with:
      app_name: "learn-hub"
      app_path: "/opt/learn-hub"
      health_check_url: "https://learn.iil.pet/healthz/"
      image_tag_override: ${{ inputs.image_tag_override || '' }}
      target_environment: ${{ inputs.target_environment || 'production' }}
      notify_discord: true
      # Import-Smoke-Gate (platform #451): lädt Django + triggert Celery-Task-
      # Autodiscovery + Root-URLConf im frisch gebauten Image. Fängt Import-
      # Contract-Drift VOR dem Deploy — sonst erst zur Laufzeit als Worker-
      # Crash-Loop sichtbar. DB-frei (nur Imports; DB-Connections sind lazy).
      # learn-hub liest SECRET_KEY aus DJANGO_SECRET_KEY (base.py), nicht SECRET_KEY.
      import_smoke: 'DJANGO_SECRET_KEY=ci-smoke DJANGO_SETTINGS_MODULE=config.settings.test python -c "import django; django.setup(); from config.celery import app; app.loader.import_default_modules(); from django.urls import get_resolver; get_resolver().url_patterns"'
    secrets: inherit
