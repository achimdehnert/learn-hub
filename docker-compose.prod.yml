services:
  migrate:
    build: .
    image: ghcr.io/achimdehnert/learn-hub:latest
    command: python manage.py migrate --noinput
    env_file: .env.prod
    depends_on:
      db: { condition: service_healthy }

  web:
    build: .
    image: ghcr.io/achimdehnert/learn-hub:latest
    env_file: .env.prod
    ports:
      - "127.0.0.1:8100:8000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    deploy:
      resources:
        limits: { memory: 512M }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/livez/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    image: ghcr.io/achimdehnert/learn-hub:latest
    command: celery -A config.celery worker -l info --concurrency=2 --max-tasks-per-child=100
    env_file: .env.prod
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped
    # Override des Dockerfile-HEALTHCHECK (HTTP :8000/livez/ — nur für `web` korrekt).
    # Der Worker fährt keinen HTTP-Server → der geerbte Check schlägt immer fehl
    # (ConnectionRefused → false `unhealthy`). Celery-Liveness via `inspect ping`.
    healthcheck:
      test: ["CMD", "celery", "-A", "config.celery", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits: { memory: 384M }

  db:
    image: postgres:16-alpine
    env_file: .env.db
    ports:
      - "5499:5432"
    volumes:
      - learn_hub_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 512M }

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits: { memory: 128M }

volumes:
  learn_hub_data:
